# Pre-commit hooks. Install with:
#
#   pipx install pre-commit && pre-commit install
#
# Every `git commit` then runs the hooks below. gitleaks is the load-bearing
# one: the previous obfs4 bridge fingerprints + certs sat in start.sh defaults
# and shipped to Docker Hub before this gate existed.

repos:
  - repo: https://github.com/gitleaks/gitleaks
    rev: v8.30.1
    hooks:
      - id: gitleaks

  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-yaml
      - id: check-added-large-files
        args: ['--maxkb=500']
      - id: check-merge-conflict
      - id: check-executables-have-shebangs

  - repo: https://github.com/shellcheck-py/shellcheck-py
    rev: v0.10.0.1
    hooks:
      - id: shellcheck
        args: ['--severity=warning']

  # actionlint catches the kind of mutable-tag and script-injection
  # patterns that were caught manually in the sec-review.
  - repo: https://github.com/rhysd/actionlint
    rev: v1.7.7
    hooks:
      - id: actionlint
