global
    log stdout format raw local0 info
    # nice-dns Stage 6 (reliability plan): emit a one-line backend-status
    # summary every 60s via Lua task, so operators can grep journalctl for
    # `backends=` to see which backend is serving without socat'ing the
    # admin socket. See status-summary.lua for the implementation.
    # haproxy 3.1+ requires this tunable set before lua-load to disambiguate
    # the boolean conversion semantic — pin to normal (post-3.1 behaviour).
    tune.lua.bool-sample-conversion normal
    lua-load /etc/haproxy/status-summary.lua

defaults
    mode tcp
    log global
    option tcplog
    # 45s covers the cold-start path of a Tor .onion connect through obfs4
    # bridges: HSDir lookup + introduce + rendezvous-circuit build + TLS to
    # the hidden service. The earlier 20s limit was the steady-state median
    # for that sequence, but measured cold-start (~3 min after Tor finishes
    # bootstrapping on obfs4) consistently hit `Layer7 timeout, check
    # duration: 20001ms` on every primary check, leaving the .onion server
    # marked DOWN for 8+ minutes after a fresh install while every query
    # silently fell back to the clearnet backup (1.1.1.1 via Tor exit) —
    # exactly the leak the backup was a safety net against, not the steady
    # state. `timeout connect 45s` and `timeout check 45s` together let the
    # cold rendezvous actually complete before haproxy gives up on the
    # check. Steady-state .onion connects unchanged (~600ms).
    timeout connect 45s
    # 180s on client + server keeps the warm DoT TCP between Unbound and
    # haproxy alive across idle gaps. Without this, haproxy closes the
    # idle backend after 60s and the next query pays a fresh TLS handshake
    # through Tor again. Paired with unbound `tcp-idle-timeout: 120000`
    # which holds its outgoing DoT connection alive for 120s, so haproxy
    # must outlast that, not the other way around.
    timeout client 180s
    timeout server 180s
    timeout check 45s
    retries 3
    option redispatch

frontend dns_dot
    bind *:853
    # Per-source connection-rate limit. Cap any single client to 50 new
    # connections per 10s window before rejecting.
    stick-table type ip size 100k expire 60s store conn_rate(10s),conn_cur
    tcp-request connection track-sc0 src
    tcp-request connection reject if { sc0_conn_rate gt 50 }
    tcp-request connection reject if { sc0_conn_cur gt 100 }
    default_backend dns_resolvers

backend dns_resolvers
    # ---------------------------------------------------------------------
    # Policy: backup is a first-class serving path, not a fallback-of-last-
    # resort. All three backends route through Tor (SOCKS4 to 127.0.0.1:9050),
    # so backup and fallback are DoT-to-Cloudflare/Quad9 via a Tor exit —
    # still end-to-end TLS-encrypted, just observable to the exit as "TLS
    # to 1.1.1.1:853". The .onion primary additionally hides the destination
    # from any relay, but it's slower to build and prone to circuit churn.
    #
    # Goals, in order of priority:
    #   1. Resolve SOMETHING as soon as Tor is bootstrapped, even if that
    #      means using backup for the first minute. `init-state down` on
    #      primary plus active backup achieves this — backup serves until
    #      primary earns its promotion.
    #   2. Prefer primary ONLY after it has demonstrated sustained
    #      reachability. `rise 3` at `inter 30s` requires three consecutive
    #      successful checks (~90s of clean primary) before promotion;
    #      `fall 3` ensures three failures in a row are required to demote
    #      back to backup, so transient onion hiccups don't flap traffic.
    #      inter 30s is also large enough that a single slow .onion
    #      rendezvous check (cold rendezvous takes 15-25s) can complete
    #      within one interval — `inter 15s` was tried first and produced
    #      `Layer7 timeout, check duration: 15005ms` because haproxy aborts
    #      in-flight checks at the next interval boundary.
    # ---------------------------------------------------------------------
    default-server inter 30s fall 3 rise 3
    # init-state down (haproxy ≥ 3.1, image bumped to alpine 3.22 for this):
    # primary starts in DOWN state, health checks still run, after rise N
    # successful probes the .onion is promoted to UP and takes over. Until
    # then traffic flows through backup — DoT to 1.1.1.1 over Tor exit — so
    # the user sees working DNS the moment Tor is up, instead of waiting
    # for the primary's first rendezvous build. Once primary promotes,
    # backup quietly returns to standby.
    server primary 10.192.0.1:853 socks4 127.0.0.1:9050 check check-via-socks4 init-state down
    server backup 1.1.1.1:853 socks4 127.0.0.1:9050 check check-via-socks4 backup
    server fallback 9.9.9.9:853 socks4 127.0.0.1:9050 check check-via-socks4 backup
